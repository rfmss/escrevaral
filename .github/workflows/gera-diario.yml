name: Gera rascunho no Diário

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  rascunho:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Clonar escrevaral
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 20

      - name: Clonar diário
        uses: actions/checkout@v4.2.2
        with:
          repository: rfmss/escrevaral-diario
          token: ${{ secrets.DIARY_TOKEN }}
          path: diario

      - name: Coletar commits do push
        id: commits
        run: |
          # Commits desde o push anterior (até 15)
          LOGS=$(git log --oneline -15 --pretty=format:"- %s" ${{ github.event.before }}..${{ github.sha }} 2>/dev/null || git log --oneline -5 --pretty=format:"- %s")

          # Extrai versão do commit mais recente (ex: v442)
          VERSION=$(git log -1 --pretty=format:"%s" | grep -oP 'v\d+' | head -1)

          # Data de hoje
          DATE=$(date +%Y-%m-%d)
          SLUG=$(echo "$VERSION" | tr '[:upper:]' '[:lower:]')-$(date +%d%m)

          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "date=$DATE"         >> $GITHUB_OUTPUT
          echo "slug=$SLUG"         >> $GITHUB_OUTPUT

          # Salva logs em arquivo temporário (preserva quebras de linha)
          echo "$LOGS" > /tmp/commits.txt
          cat /tmp/commits.txt

      - name: Verificar se rascunho já existe
        id: existe
        run: |
          ARQUIVO="diario/_posts/${{ steps.commits.outputs.date }}-${{ steps.commits.outputs.slug }}.md"
          if [ -f "$ARQUIVO" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Gerar texto do post com IA (Hugging Face)
        id: ia
        if: steps.existe.outputs.exists == 'false' && steps.commits.outputs.version != ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          VERSION="${{ steps.commits.outputs.version }}"
          COMMITS=$(sed -E 's/^- (feat|fix|docs|chore|refactor|style|test|perf|build|ci)(\([^)]*\))?: */- /' /tmp/commits.txt)

          if [ -z "$HF_TOKEN" ]; then
            echo "Sem HF_TOKEN configurado — seguindo com modelo mecânico." >&2
            echo "ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          cat > /tmp/mensagem-usuario.txt << EOF
          Versão: ${VERSION}

          Commits desta versão:
          ${COMMITS}

          Escreva o registro do diário para esta versão, seguindo exatamente o formato pedido.
          EOF

          PAYLOAD=$(jq -n \
            --rawfile sistema .github/diario-agente-prompt.md \
            --rawfile usuario /tmp/mensagem-usuario.txt \
            '{
              model: "meta-llama/Llama-3.1-8B-Instruct",
              messages: [
                {role: "system", content: $sistema},
                {role: "user", content: $usuario}
              ],
              max_tokens: 900,
              temperature: 0.6
            }')

          RESPOSTA=$(curl -s --max-time 90 https://router.huggingface.co/v1/chat/completions \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # Remove blocos de código (```...```) que o modelo às vezes usa para envolver a resposta inteira
          TEXTO=$(echo "$RESPOSTA" | jq -r '.choices[0].message.content // empty' 2>/dev/null | sed -E '/^```/d')

          if [ -n "$TEXTO" ] && echo "$TEXTO" | grep -q "^TITULO:" && echo "$TEXTO" | grep -q "^RESUMO:"; then
            echo "$TEXTO" > /tmp/texto-ia.txt
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "IA respondeu no formato esperado."
          else
            echo "IA não respondeu no formato esperado — seguindo com modelo mecânico." >&2
            echo "$RESPOSTA" | head -c 500 >&2
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Montar e publicar registro
        if: steps.existe.outputs.exists == 'false' && steps.commits.outputs.version != ''
        run: |
          VERSION="${{ steps.commits.outputs.version }}"
          DATE="${{ steps.commits.outputs.date }}"
          SLUG="${{ steps.commits.outputs.slug }}"
          ARQUIVO="diario/_posts/${DATE}-${SLUG}.md"

          # Remove prefixo de tipo de commit (feat:, fix:, docs: etc) para leitura humana
          COMMITS=$(sed -E 's/^- (feat|fix|docs|chore|refactor|style|test|perf|build|ci)(\([^)]*\))?: */- /' /tmp/commits.txt)

          if [ "${{ steps.ia.outputs.ok }}" = "true" ]; then
            TEXTO=$(cat /tmp/texto-ia.txt)
            TITULO=$(echo "$TEXTO" | sed -n 's/^TITULO: *//p' | head -1 | sed 's/"/\\"/g')
            RESUMO=$(echo "$TEXTO" | sed -n 's/^RESUMO: *//p' | head -1 | sed 's/"/\\"/g')
            CORPO=$(echo "$TEXTO" | awk '/^---$/{found=1; next} found')
          else
            RESUMO_BASE=$(echo "$COMMITS" | head -1 | sed -E 's/^- //; s/"/\\"/g; s/^(.)/\U\1/')
            TITULO="${VERSION} — ${RESUMO_BASE}"
            RESUMO="${RESUMO_BASE}"
            CORPO="## O que mudou na ${VERSION}

          ${COMMITS}"
          fi

          cat > "$ARQUIVO" << POST
          ---
          layout: post
          title: "${TITULO}"
          version: "${VERSION}"
          date: ${DATE}
          tags: [bastidores]
          excerpt: "${RESUMO}"
          published: true
          ---

          ${CORPO}

          ---

          *Registro gerado automaticamente a partir do histórico de versões do Escrevaral — um subproduto direto do trabalho, sem curadoria manual.*
          POST

          echo "Registro publicado: $ARQUIVO"

      - name: Criar release no GitHub
        if: steps.commits.outputs.version != ''
        run: |
          VERSION="${{ steps.commits.outputs.version }}"
          gh release view "$VERSION" --repo rfmss/escrevaral 2>/dev/null || \
            gh release create "$VERSION" \
              --repo rfmss/escrevaral \
              --title "$VERSION" \
              --generate-notes \
              --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit e push do registro
        if: steps.existe.outputs.exists == 'false' && steps.commits.outputs.version != ''
        run: |
          cd diario
          git config user.name  "escrevaral-bot"
          git config user.email "oi@escrevaral.com"
          git add _posts/
          git commit -m "post: ${{ steps.commits.outputs.version }} — publicado automaticamente"
          git push
