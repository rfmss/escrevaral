<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrevaral — Painel de Jornada</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #181818;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --text: #e8e8e8;
  --muted: #555555;
  --muted2: #3a3a3a;
  --done: #22c55e;
  --active: #f59e0b;
  --pending: #374151;
  --crit: #f43f5e;
  --high: #f59e0b;
  --med: #6366f1;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  padding: 0 0 80px;
}

/* HEADER */
.site-header {
  border-bottom: 1px solid var(--border);
  padding: 32px 40px 28px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
}
.brand { display: flex; flex-direction: column; gap: 6px; }
.brand-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #fff;
}
.brand-sub {
  font-size: 12px;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: 0.02em;
}
.header-meta {
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-end;
}
.versao-badge {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--active);
  font-family: var(--mono);
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 4px;
  letter-spacing: 0.05em;
}
.atualizado { font-size: 11px; color: var(--muted); font-family: var(--mono); }

/* POSICIONAMENTO */
.posicionamento {
  border-bottom: 1px solid var(--border);
  padding: 18px 40px;
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}
.posicionamento strong { color: var(--text); font-style: normal; }

/* LAYOUT */
main { padding: 32px 40px; display: flex; flex-direction: column; gap: 40px; }

/* SECTION TITLE */
.section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* MÉTRICAS */
.metricas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}
.metrica-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.metrica-valor {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}
.metrica-valor.ok { color: var(--done); }
.metrica-valor.warn { color: var(--active); }
.metrica-label { font-size: 11px; color: var(--muted); letter-spacing: 0.03em; }

/* PILARES */
.pilares-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.pilar-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--done);
  border-radius: 8px;
  padding: 16px 18px;
}
.pilar-titulo { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 6px; }
.pilar-copy { font-size: 13px; color: var(--muted); font-style: italic; }

/* TIMELINE */
.timeline {
  display: flex;
  gap: 0;
  overflow-x: auto;
  padding-bottom: 4px;
}
.fase-col {
  flex: 1;
  min-width: 140px;
  position: relative;
}
.fase-col::after {
  content: '';
  position: absolute;
  right: 0; top: 24px;
  width: 1px; height: calc(100% - 24px);
  background: var(--border);
}
.fase-col:last-child::after { display: none; }
.fase-header {
  padding: 12px 14px 10px;
  border-bottom: 2px solid var(--border);
  position: relative;
}
.fase-nome { font-size: 12px; font-weight: 700; color: #fff; }
.fase-periodo { font-size: 10px; color: var(--muted); font-family: var(--mono); }
.fase-status-bar {
  height: 3px;
  border-radius: 2px;
  margin-top: 10px;
  background: var(--border2);
}
.fase-status-bar.concluida { background: var(--done); }
.fase-status-bar.ativa { background: var(--active); }
.fase-body { padding: 12px 14px; font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ÉPICOS */
.epicos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.epico-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
}
.epico-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.epico-icone { font-size: 18px; line-height: 1; }
.epico-nome { font-size: 13px; font-weight: 600; color: #fff; }
.epico-desc { font-size: 11px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
.progress-bar-wrap {
  display: flex; align-items: center; gap: 8px;
}
.progress-bar {
  flex: 1; height: 4px; border-radius: 3px;
  background: var(--border2); overflow: hidden;
}
.progress-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.progress-pct { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 30px; text-align: right; }

/* TICKETS */
.sprint-label {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 4px; padding: 3px 10px;
  font-size: 11px; color: var(--active); font-family: var(--mono);
  margin-bottom: 16px;
}
.sprint-label::before { content: '▶'; font-size: 8px; }

.tickets-list { display: flex; flex-direction: column; gap: 8px; }
.ticket {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: start;
  gap: 12px;
  transition: border-color .15s;
}
.ticket:hover { border-color: var(--border2); }
.ticket.concluido { opacity: 0.5; }
.ticket.concluido .ticket-titulo { text-decoration: line-through; color: var(--muted); }

.ticket-check {
  width: 18px; height: 18px; border-radius: 4px;
  border: 1.5px solid var(--border2);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
  transition: all .15s;
}
.ticket-check.checked { background: var(--done); border-color: var(--done); }
.ticket-check.checked::after { content: '✓'; font-size: 11px; color: #000; font-weight: 700; }

.ticket-body { display: flex; flex-direction: column; gap: 3px; }
.ticket-id { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.ticket-titulo { font-size: 13px; font-weight: 500; color: var(--text); }
.ticket-desc { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 2px; }
.ticket-nota { font-size: 11px; color: var(--active); margin-top: 4px; font-style: italic; }

.ticket-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.epico-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 3px;
  font-family: var(--mono); letter-spacing: 0.03em;
  border: 1px solid; opacity: 0.8;
}
.prioridade-badge {
  font-size: 10px; font-family: var(--mono);
  padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.prioridade-badge.critica { color: var(--crit); background: rgba(244,63,94,.1); }
.prioridade-badge.alta { color: var(--high); background: rgba(245,158,11,.1); }
.prioridade-badge.media { color: #6366f1; background: rgba(99,102,241,.1); }
.estimativa {
  font-size: 10px; color: var(--muted); font-family: var(--mono);
  border: 1px solid var(--border2); padding: 1px 6px; border-radius: 3px;
}

/* MANIFESTO */
.manifesto-list { display: flex; flex-direction: column; gap: 0; counter-reset: manifesto; }
.manifesto-item {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  counter-increment: manifesto;
}
.manifesto-item:last-child { border-bottom: none; }
.manifesto-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  padding-top: 2px;
}
.manifesto-texto { font-size: 14px; line-height: 1.65; color: var(--text); }
.manifesto-item:last-child .manifesto-texto {
  font-style: italic; font-size: 15px; color: #fff; font-weight: 500;
}

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 24px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .site-header { padding: 20px; flex-direction: column; }
  main { padding: 20px; gap: 32px; }
  .header-meta { align-items: flex-start; }
  .posicionamento { padding: 14px 20px; }
  footer { padding: 20px; flex-direction: column; gap: 8px; }
  .ticket { grid-template-columns: auto 1fr; }
  .ticket-meta { display: none; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="brand">
    <div class="brand-name">Escrevaral</div>
    <div class="brand-sub">painel de jornada · roadmap interno</div>
  </div>
  <div class="header-meta">
    <div class="versao-badge" id="versao-badge">—</div>
    <div class="atualizado" id="atualizado">carregando...</div>
  </div>
</header>

<div class="posicionamento" id="posicionamento-bloco"></div>

<main>

  <!-- MÉTRICAS -->
  <section>
    <div class="section-title">Métricas atuais</div>
    <div class="metricas-grid" id="metricas-grid"></div>
  </section>

  <!-- PILARES -->
  <section>
    <div class="section-title">Pilares de produto</div>
    <div class="pilares-grid" id="pilares-grid"></div>
  </section>

  <!-- TIMELINE -->
  <section>
    <div class="section-title">Linha do tempo — Jul → Nov 2026</div>
    <div class="timeline" id="timeline"></div>
  </section>

  <!-- ÉPICOS -->
  <section>
    <div class="section-title">Épicos</div>
    <div class="epicos-grid" id="epicos-grid"></div>
  </section>

  <!-- SPRINT ATIVO -->
  <section>
    <div class="section-title">Tickets</div>
    <div class="sprint-label" id="sprint-label">Sprint ativo</div>
    <div class="tickets-list" id="tickets-list"></div>
  </section>

  <!-- MANIFESTO -->
  <section>
    <div class="section-title">Manifesto</div>
    <div class="manifesto-list" id="manifesto-list"></div>
  </section>

</main>

<footer>
  <span>Escrevaral · github.com/rfmss/escrevaral</span>
  <span id="footer-build">—</span>
</footer>

<script>
const EPICO_CORES = {};

function h(tag, cls, html) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html !== undefined) el.innerHTML = html;
  return el;
}

function badge(label, cor, bg) {
  const el = h('span', 'epico-tag');
  el.textContent = label;
  el.style.color = cor;
  el.style.borderColor = cor + '55';
  el.style.background = bg || cor + '11';
  return el;
}

async function loadData() {
  let data;
  try {
    const r = await fetch('./roadmap-data.json?t=' + Date.now());
    data = await r.json();
  } catch(e) {
    document.body.innerHTML = '<div style="padding:40px;color:#555;font-family:monospace">roadmap-data.json não encontrado.</div>';
    return;
  }

  // Armazena cores dos épicos
  data.epicos.forEach(e => { EPICO_CORES[e.id] = e.cor; });

  renderHeader(data);
  renderMetricas(data.metricas);
  renderPilares(data.pilares);
  renderTimeline(data.fases);
  renderEpicos(data.epicos);
  renderTickets(data.tickets, data.fases);
  renderManifesto(data.manifesto);
}

function renderHeader(data) {
  document.getElementById('versao-badge').textContent = data.meta.versao;
  document.getElementById('atualizado').textContent = 'atualizado ' + data.meta.atualizado;
  document.getElementById('posicionamento-bloco').innerHTML =
    `<strong>"${data.meta.posicionamento}"</strong> · <span>${data.meta.definicao_tecnica}</span>`;
  document.getElementById('footer-build').textContent = data.meta.versao + ' · ' + data.meta.atualizado;
}

function renderMetricas(m) {
  const grid = document.getElementById('metricas-grid');
  const items = [
    { val: m.definicoes.toLocaleString('pt-BR'), label: 'Definições literárias', cls: '' },
    { val: m.sinonimos.toLocaleString('pt-BR'), label: 'Sinônimos calibrados', cls: '' },
    { val: m.bench_ok + '/' + m.bench_casos, label: 'Bench gramatical', cls: 'ok' },
    { val: m.golden_total, label: 'Frases golden', cls: '' },
    { val: m.golden_regressoes, label: 'Regressões', cls: m.golden_regressoes === 0 ? 'ok' : 'warn' },
    { val: m.regras_gramatica, label: 'Regras R1–R10', cls: '' },
    { val: m.commits_locais, label: 'Commits sem push', cls: m.commits_locais > 0 ? 'warn' : 'ok' },
  ];
  items.forEach(i => {
    const card = h('div', 'metrica-card');
    const val = h('div', 'metrica-valor ' + i.cls, String(i.val));
    const lbl = h('div', 'metrica-label', i.label);
    card.append(val, lbl);
    grid.appendChild(card);
  });
}

function renderPilares(pilares) {
  const grid = document.getElementById('pilares-grid');
  pilares.forEach(p => {
    const card = h('div', 'pilar-card');
    card.innerHTML = `<div class="pilar-titulo">${p.titulo}</div><div class="pilar-copy">"${p.copy}"</div>`;
    grid.appendChild(card);
  });
}

function renderTimeline(fases) {
  const tl = document.getElementById('timeline');
  fases.forEach(f => {
    const col = h('div', 'fase-col');
    const bar = h('div', 'fase-status-bar ' + f.status);
    col.innerHTML = `
      <div class="fase-header" style="border-bottom-color:${f.cor}22">
        <div class="fase-nome" style="color:${f.status === 'pendente' ? '#888' : '#fff'}">${f.nome}</div>
        <div class="fase-periodo">${f.periodo}</div>
        <div class="fase-status-bar ${f.status}" style="${f.status === 'ativa' ? 'background:' + f.cor : f.status === 'concluida' ? 'background:' + f.cor : ''}"></div>
      </div>
      <div class="fase-body">${f.descricao}</div>`;
    tl.appendChild(col);
  });
}

function renderEpicos(epicos) {
  const grid = document.getElementById('epicos-grid');
  epicos.forEach(e => {
    const card = h('div', 'epico-card');
    card.innerHTML = `
      <div class="epico-header">
        <span class="epico-icone">${e.icone}</span>
        <span class="epico-nome" style="color:${e.cor}">${e.nome}</span>
      </div>
      <div class="epico-desc">${e.descricao}</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar">
          <div class="progress-fill" style="width:${e.progresso}%;background:${e.cor}"></div>
        </div>
        <span class="progress-pct">${e.progresso}%</span>
      </div>`;
    grid.appendChild(card);
  });
}

function renderTickets(tickets, fases) {
  const list = document.getElementById('tickets-list');
  const sprintLabel = document.getElementById('sprint-label');

  const faseAtiva = fases.find(f => f.status === 'ativa');
  if (faseAtiva) sprintLabel.textContent = '▶  Sprint · ' + faseAtiva.nome + ' — ' + faseAtiva.descricao;

  // Agrupa por fase
  const porFase = {};
  tickets.forEach(t => {
    if (!porFase[t.fase]) porFase[t.fase] = [];
    porFase[t.fase].push(t);
  });

  const ordemFases = fases.map(f => f.id);
  ordemFases.forEach(fId => {
    if (!porFase[fId]) return;
    const fase = fases.find(f => f.id === fId);
    if (!fase) return;

    const header = h('div', '', '');
    header.style.cssText = `font-size:11px;font-weight:600;color:${fase.cor};letter-spacing:.08em;text-transform:uppercase;padding:12px 0 6px;margin-top:4px;`;
    header.textContent = fase.nome + (fase.status === 'concluida' ? ' ✓' : '');
    list.appendChild(header);

    porFase[fId].forEach(t => {
      const cor = EPICO_CORES[t.epico] || '#666';
      const isConcluido = t.status === 'concluido';

      const ticket = h('div', 'ticket' + (isConcluido ? ' concluido' : ''));

      const check = h('div', 'ticket-check' + (isConcluido ? ' checked' : ''));
      check.title = isConcluido ? 'Concluído' : 'Pendente';
      check.addEventListener('click', () => {
        const newStatus = isConcluido ? 'pendente' : 'concluido';
        ticket.classList.toggle('concluido');
        check.classList.toggle('checked');
        console.log(`[roadmap] ticket ${t.id} → ${newStatus} (atualize roadmap-data.json)`);
      });

      const body = h('div', 'ticket-body');
      body.innerHTML = `
        <span class="ticket-id">${t.id}</span>
        <span class="ticket-titulo">${t.titulo}</span>
        <span class="ticket-desc">${t.descricao}</span>
        ${t.nota ? `<span class="ticket-nota">⚑ ${t.nota}</span>` : ''}`;

      const meta = h('div', 'ticket-meta');
      const epicoTag = badge(t.epico, cor);
      const prioEl = h('span', `prioridade-badge ${t.prioridade}`, t.prioridade);
      const estEl = h('span', 'estimativa', t.estimativa);
      meta.append(epicoTag, prioEl, estEl);

      ticket.append(check, body, meta);
      list.appendChild(ticket);
    });
  });
}

function renderManifesto(linhas) {
  const list = document.getElementById('manifesto-list');
  linhas.forEach((linha, i) => {
    const item = h('div', 'manifesto-item');
    item.innerHTML = `
      <span class="manifesto-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="manifesto-texto">${linha}</span>`;
    list.appendChild(item);
  });
}

loadData();
</script>
</body>
</html>
